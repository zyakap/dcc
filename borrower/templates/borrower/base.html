<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}DCC Borrower Portal{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root,[data-theme="dark"]{--bg:#0d1117;--card:#161b22;--border:#21262d;--text:#c9d1d9;--muted:#8b949e;--accent:#1f6feb;--success:#3fb950;--danger:#f85149;}
  [data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--border:#d0d7de;--text:#24292f;--muted:#57606a;--accent:#0969da;--success:#1a7f37;--danger:#cf222e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
  a{color:var(--accent)}
  .topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
  .topbar-brand{font-weight:700;font-size:15px;color:var(--text);text-decoration:none}
  .topbar-tag{font-size:11px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px}
  .main{max-width:960px;margin:0 auto;padding:24px 16px}
  .sa-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
  .sa-card-header{font-weight:600;font-size:13px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid var(--border)}
  .sa-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;border:1px solid transparent}
  .sa-btn-primary{background:var(--accent);color:#fff}
  .sa-btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
  .form-control,.form-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 11px;width:100%;font-size:13px}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
  .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px}
  .alert-danger{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);color:var(--danger)}
  .alert-success{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);color:var(--success)}
  .badge-status{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
  .badge-open{background:rgba(31,111,235,.15);color:var(--accent)}
  .badge-resolved{background:rgba(63,185,80,.15);color:var(--success)}
  .badge-dismissed{background:rgba(139,148,158,.12);color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:left}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
</style>
</head>
<body>
<nav class="topbar">
  <a href="{% url 'borrower_dashboard' %}" class="topbar-brand">
    <i class="bi bi-shield-check"></i> DCC
  </a>
  <span class="topbar-tag">Borrower Portal</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <a href="{% url 'borrower_enquiries' %}" style="color:var(--muted);font-size:13px;"><i class="bi bi-eye"></i> Enquiries</a>
    <a href="{% url 'borrower_disputes' %}" style="color:var(--muted);font-size:13px;"><i class="bi bi-flag"></i> Disputes</a>
    <a href="{% url 'borrower_consents' %}" style="color:var(--muted);font-size:13px;"><i class="bi bi-check-circle"></i> Consents</a>
    <form method="post" action="{% url 'borrower_logout' %}" style="margin:0;">
      {% csrf_token %}
      <button type="submit" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;"><i class="bi bi-box-arrow-right"></i> Sign out</button>
    </form>
  </div>
</nav>
<div class="main">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'success' %}success{% else %}danger{% endif %}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
