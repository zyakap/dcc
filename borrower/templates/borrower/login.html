<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCC Borrower Portal — Sign In</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#21262d;--text:#c9d1d9;--muted:#8b949e;--accent:#1f6feb;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .box{width:340px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;}
  h2{font-size:20px;font-weight:700;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500;}
  .form-control{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;width:100%;font-size:14px;margin-bottom:16px;}
  .btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;}
  .alert{padding:10px;border-radius:6px;font-size:13px;margin-bottom:16px;background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);color:#f85149;}
</style>
</head>
<body>
<div class="box">
  <div style="text-align:center;margin-bottom:20px;">
    <i class="bi bi-shield-check" style="font-size:36px;color:#1f6feb;"></i>
    <h2 style="margin-top:8px;">Borrower Portal</h2>
    <p class="sub">Sign in to view your credit file</p>
  </div>
  {% for message in messages %}
  <div class="alert">{{ message }}</div>
  {% endfor %}
  <form method="post" action="{% url 'borrower_login' %}">
    {% csrf_token %}
    <label class="form-label">Email Address</label>
    <input type="email" name="email" class="form-control" required placeholder="your@email.com">
    <label class="form-label">6-digit PIN</label>
    <input type="password" name="pin" class="form-control" required placeholder="••••••" maxlength="6">
    <button type="submit" class="btn">Sign In</button>
  </form>
  <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:16px;">
    Don't have a PIN? Contact DCC to register.
  </p>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
